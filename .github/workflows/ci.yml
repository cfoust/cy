name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24"

      - name: Install zsh
        # This is used for the TestDefaultShell test
        run: sudo apt-get install -qqy zsh libx11-dev just

      - name: Generate and format code
        run: |
          go generate ./cmd/... ./pkg/...
          just format
          go mod tidy
          git add .
          git diff HEAD
          git diff-index --quiet --cached HEAD --

      - name: Lint
        run: |
          just lint

      - name: Build
        run: go build -v ./cmd/cy/.

      - name: Test
        run: just test-race -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Build docs
        env:
          CY_SKIP_ASSETS: "1"
        run: |
          cd docs
          npm ci
          # Building all of the assets for the docs site takes a while; we only
          # build it on release. This is just to verify that this PR/commit did
          # not break any documentation.
          npm run build
