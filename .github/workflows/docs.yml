name: Deploy documentation

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To push a branch
      pages: write # To push to a GitHub Pages site
      id-token: write # To update the deployment status
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Store version in environment
        run: |
          TAG=$(git describe --tags --always --abbrev=0)
          echo "CY_VERSION=${TAG:1}" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install npm dependencies
        run: cd docs && npm ci

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24"

      - name: Install agg
        run: |
          AGG_VERSION="v1.7.0"
          curl -L -o /usr/local/bin/agg \
            "https://github.com/asciinema/agg/releases/download/${AGG_VERSION}/agg-x86_64-unknown-linux-gnu"
          chmod +x /usr/local/bin/agg

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -qqy vim htop libx11-dev

      - name: Build storybook binary
        run: >
          go build
          -ldflags "-X github.com/cfoust/cy/pkg/version.Version=${CY_VERSION}"
          -o docs/storybook
          ./cmd/stories

      - name: Build Docusaurus site
        run: cd docs && npm run build

      - name: Setup pages
        uses: actions/configure-pages@v2

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs/build"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
